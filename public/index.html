<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GroupPool – Gemeinsam spenden</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0e0e10;
      --surface: #18181b;
      --card:    #1f1f23;
      --border:  #2c2c35;
      --purple:  #9146ff;
      --purple2: #772ce8;
      --green:   #00c853;
      --text:    #efeff1;
      --muted:   #adadb8;
      --red:     #eb0400;
    }

    body { font-family: -apple-system, BlinkMacSystemFont, "Inter", sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    /* ── Layout ── */
    header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 24px; height: 56px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 20px; font-weight: 800; color: var(--purple); letter-spacing: -.5px; }
    .logo span { color: var(--text); font-weight: 400; }

    .main { max-width: 1200px; margin: 0 auto; padding: 28px 20px 60px; }

    /* ── Tabs ── */
    .tabs { display: flex; gap: 4px; margin-bottom: 28px; border-bottom: 1px solid var(--border); }
    .tab { background: none; border: none; color: var(--muted); font-size: 14px; font-weight: 600; padding: 10px 18px; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; transition: color .15s, border-color .15s; }
    .tab.active { color: var(--text); border-color: var(--purple); }
    .tab:hover:not(.active) { color: var(--text); }

    .section { display: none; }
    .section.active { display: block; }

    /* ── Section heading ── */
    .section-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
    .section-title { font-size: 18px; font-weight: 700; }
    .badge { font-size: 11px; font-weight: 700; background: var(--purple); color: #fff; border-radius: 100px; padding: 2px 8px; margin-left: 8px; vertical-align: middle; }

    /* ── Buttons ── */
    .btn { background: var(--purple); color: #fff; border: none; padding: 9px 18px; border-radius: 6px; cursor: pointer; font-weight: 700; font-size: 13px; transition: background .15s; }
    .btn:hover { background: var(--purple2); }
    .btn:disabled { opacity: .45; cursor: not-allowed; }
    .btn-sm { padding: 6px 14px; font-size: 12px; }
    .btn-outline { background: none; border: 1px solid var(--border); color: var(--text); }
    .btn-outline:hover { background: var(--card); }
    .btn-green { background: var(--green); }
    .btn-green:hover { background: #00b04a; }

    /* ── Stream grid ── */
    .stream-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
    .stream-card { background: var(--card); border-radius: 10px; overflow: hidden; cursor: pointer; transition: transform .15s, box-shadow .15s; border: 1px solid var(--border); }
    .stream-card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,.4); border-color: var(--purple); }
    .stream-thumb { width: 100%; aspect-ratio: 16/9; object-fit: cover; background: var(--surface); display: block; }
    .stream-thumb-placeholder { width: 100%; aspect-ratio: 16/9; background: linear-gradient(135deg, #1a1a2e, #2d1b69); display: flex; align-items: center; justify-content: center; font-size: 36px; }
    .stream-body { padding: 12px; }
    .stream-name { font-weight: 700; font-size: 14px; margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .stream-title { font-size: 12px; color: var(--muted); margin-bottom: 8px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .stream-viewers { font-size: 12px; color: var(--red); font-weight: 700; display: flex; align-items: center; gap: 5px; }
    .live-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--red); display: inline-block; }
    .stream-select-btn { width: 100%; margin-top: 10px; }

    /* ── Pool grid ── */
    .pool-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 16px; }
    .pool-card { background: var(--card); border-radius: 10px; padding: 18px; border: 1px solid var(--border); }
    .pool-card-head { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 12px; }
    .pool-streamer { font-size: 13px; color: var(--purple); font-weight: 700; }
    .pool-gruppe { font-size: 16px; font-weight: 800; margin-top: 2px; }
    .pool-status { font-size: 11px; font-weight: 700; padding: 3px 8px; border-radius: 100px; background: rgba(0,200,83,.15); color: var(--green); }
    .pool-status.triggered { background: rgba(145,70,255,.15); color: var(--purple); }
    .pool-status.captcha { background: rgba(235,4,0,.15); color: var(--red); }
    .captcha-admin-info { margin-top: 10px; padding: 8px 10px; background: rgba(235,4,0,.08); border: 1px solid rgba(235,4,0,.3); border-radius: 6px; font-size: 11px; color: var(--red); }
    .pool-msg { font-size: 13px; color: var(--muted); margin-bottom: 14px; font-style: italic; }
    .progress-wrap { margin-bottom: 12px; }
    .progress-label { display: flex; justify-content: space-between; font-size: 12px; color: var(--muted); margin-bottom: 6px; }
    .progress-label strong { color: var(--text); }
    .progress-bar { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
    .progress-fill { height: 100%; background: var(--purple); border-radius: 3px; transition: width .4s; }
    .progress-fill.done { background: var(--green); }
    .pool-meta { display: flex; gap: 12px; font-size: 12px; color: var(--muted); margin-bottom: 14px; }
    .pool-actions { display: flex; gap: 8px; }

    /* ── Empty state ── */
    .empty { text-align: center; padding: 60px 20px; color: var(--muted); }
    .empty-icon { font-size: 48px; margin-bottom: 12px; }
    .empty p { font-size: 15px; }

    /* ── Spinner ── */
    .spinner { display: inline-block; width: 18px; height: 18px; border: 2px solid rgba(255,255,255,.2); border-top-color: #fff; border-radius: 50%; animation: spin .7s linear infinite; vertical-align: middle; margin-right: 6px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Toast ── */
    #toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--surface); color: var(--text); padding: 12px 22px; border-radius: 8px; font-size: 14px; font-weight: 600; box-shadow: 0 8px 32px rgba(0,0,0,.5); border: 1px solid var(--border); opacity: 0; transition: opacity .25s, transform .25s; z-index: 9999; pointer-events: none; }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    #toast.success { border-color: var(--green); color: var(--green); }
    #toast.error   { border-color: var(--red); color: var(--red); }

    /* ── Modal ── */
    .modal-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,.75); display: flex; align-items: center; justify-content: center; z-index: 500; padding: 20px; opacity: 0; pointer-events: none; transition: opacity .2s; }
    .modal-backdrop.open { opacity: 1; pointer-events: all; }
    .modal { background: var(--surface); border-radius: 12px; border: 1px solid var(--border); max-width: 480px; width: 100%; padding: 28px; transform: translateY(12px); transition: transform .2s; }
    .modal-backdrop.open .modal { transform: translateY(0); }
    .modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 22px; }
    .modal-title { font-size: 18px; font-weight: 800; }
    .modal-close { background: none; border: none; color: var(--muted); font-size: 22px; cursor: pointer; line-height: 1; padding: 4px; }
    .modal-close:hover { color: var(--text); }
    .field { margin-bottom: 16px; }
    .field label { display: block; font-size: 12px; font-weight: 700; color: var(--muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: .05em; }
    .field input, .field textarea { width: 100%; background: var(--card); border: 1px solid var(--border); color: var(--text); border-radius: 6px; padding: 10px 12px; font-size: 14px; font-family: inherit; outline: none; transition: border-color .15s; }
    .field input:focus, .field textarea:focus { border-color: var(--purple); }
    .field input[readonly] { opacity: .6; cursor: default; }
    .field textarea { resize: vertical; min-height: 80px; }
    .modal-footer { display: flex; gap: 10px; margin-top: 24px; justify-content: flex-end; }

    /* ── Contributions list ── */
    .contrib-list { font-size: 13px; color: var(--muted); margin-top: 8px; }
    .contrib-list li { padding: 4px 0; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; }
    .contrib-list li:last-child { border: none; }

    @media (max-width: 600px) {
      .stream-grid, .pool-grid { grid-template-columns: 1fr; }
      header { padding: 0 16px; }
      .main { padding: 20px 14px 50px; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">🎯 Group<span>Pool</span></div>
  <div style="display:flex;gap:8px;align-items:center;">
    <span id="refreshTimer" style="font-size:12px;color:var(--muted)"></span>
    <button class="btn btn-sm btn-outline" onclick="reload()">↻ Aktualisieren</button>
  </div>
</header>

<div class="main">
  <div class="tabs">
    <button class="tab active" onclick="switchTab('streams')">🔴 Live Streams</button>
    <button class="tab" onclick="switchTab('pools')">💰 Aktive Pools <span id="poolCountBadge" class="badge" style="display:none"></span></button>
  </div>

  <!-- ── Streams ── -->
  <div id="tab-streams" class="section active">
    <div class="section-head">
      <div class="section-title">Live auf Twitch <span id="streamCount" style="font-size:13px;color:var(--muted);font-weight:400"></span></div>
      <button class="btn btn-sm" onclick="showCreateModal()">+ Neuer Pool</button>
    </div>
    <div id="streamGrid" class="stream-grid">
      <div style="grid-column:1/-1;padding:40px;text-align:center;color:var(--muted)">
        <div class="spinner"></div> Streams laden…
      </div>
    </div>
  </div>

  <!-- ── Pools ── -->
  <div id="tab-pools" class="section">
    <div class="section-head">
      <div class="section-title">Aktive Spenden-Pools</div>
      <button class="btn btn-sm" onclick="showCreateModal()">+ Neuer Pool</button>
    </div>
    <div id="poolGrid" class="pool-grid">
      <div style="grid-column:1/-1;padding:40px;text-align:center;color:var(--muted)">
        <div class="spinner"></div> Pools laden…
      </div>
    </div>
  </div>
</div>

<!-- ── Modal: Pool erstellen ── -->
<div id="createModal" class="modal-backdrop" onclick="closeOnBackdrop(event, 'createModal')">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">🎯 Neuen Pool erstellen</div>
      <button class="modal-close" onclick="closeModal('createModal')">✕</button>
    </div>
    <div class="field">
      <label>Streamer (Twitch-Login)</label>
      <input id="c-streamer" type="text" placeholder="z. B. eliasn97">
    </div>
    <div class="field">
      <label>Gruppen-Name</label>
      <input id="c-gruppe" type="text" placeholder="z. B. Die Donnerstags-Crew">
    </div>
    <div class="field">
      <label>Spenden-Nachricht</label>
      <textarea id="c-message" placeholder="Eure Nachricht an den Streamer…"></textarea>
    </div>
    <div class="field">
      <label>Zielbetrag (€)</label>
      <input id="c-ziel" type="number" min="1" step="1" placeholder="50">
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('createModal')">Abbrechen</button>
      <button class="btn" id="createSubmitBtn" onclick="submitCreate()">Pool erstellen</button>
    </div>
  </div>
</div>

<!-- ── Modal: Pool joinen ── -->
<div id="joinModal" class="modal-backdrop" onclick="closeOnBackdrop(event, 'joinModal')">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">💸 Pool beitreten</div>
      <button class="modal-close" onclick="closeModal('joinModal')">✕</button>
    </div>
    <div id="joinPoolInfo" style="background:var(--card);border-radius:8px;padding:14px;margin-bottom:20px;font-size:14px;"></div>
    <div class="field">
      <label>Dein Name</label>
      <input id="j-name" type="text" placeholder="Dein Twitch-Name">
    </div>
    <div class="field">
      <label>Betrag (€)</label>
      <input id="j-betrag" type="number" min="1" step="1" placeholder="10">
    </div>
    <div id="joinContribs" style="margin-top:4px;margin-bottom:8px;"></div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('joinModal')">Abbrechen</button>
      <button class="btn btn-green" id="joinSubmitBtn" onclick="submitJoin()">✅ Mitmachen (simuliert)</button>
    </div>
  </div>
</div>

<!-- ── Toast ── -->
<div id="toast"></div>

<script>
  /* ─── State ─────────────────────────────────────────────────────────────── */
  let streams = [];
  let pools   = [];
  let activeJoinPoolId = null;
  let countdown = 0;
  let countdownInterval = null;

  /* ─── Tab switching ──────────────────────────────────────────────────────── */
  function switchTab(name) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.getElementById('tab-' + name).classList.add('active');
    event.currentTarget.classList.add('active');
  }

  /* ─── Fetch helpers ──────────────────────────────────────────────────────── */
  async function apiFetch(url, opts) {
    const res = await fetch(url, opts);
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.error || `HTTP ${res.status}`);
    }
    return res.json();
  }

  /* ─── Load streams ───────────────────────────────────────────────────────── */
  async function loadStreams() {
    try {
      const data = await apiFetch('/api/live-streamers');
      streams = data.streamers || [];
      renderStreams();
    } catch (e) {
      document.getElementById('streamGrid').innerHTML =
        `<div style="grid-column:1/-1" class="empty"><div class="empty-icon">📡</div><p>Streams konnten nicht geladen werden.<br><small>${e.message}</small></p></div>`;
    }
  }

  function renderStreams() {
    const grid = document.getElementById('streamGrid');
    document.getElementById('streamCount').textContent = streams.length ? `(${streams.length})` : '';
    if (!streams.length) {
      grid.innerHTML = '<div style="grid-column:1/-1" class="empty"><div class="empty-icon">📺</div><p>Keine Live-Streams gefunden.</p></div>';
      return;
    }
    grid.innerHTML = streams.map(s => {
      const thumb = `https://static-cdn.jtvnw.net/previews-ttv/live_user_${s.user_login}-320x180.jpg`;
      const viewers = s.viewer_count >= 1000
        ? (s.viewer_count / 1000).toFixed(1) + 'K'
        : s.viewer_count;
      return `
        <div class="stream-card" onclick="selectStream('${esc(s.user_login)}', '${esc(s.user_name)}')">
          <img class="stream-thumb" src="${thumb}" alt="${esc(s.user_name)}"
               onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
          <div class="stream-thumb-placeholder" style="display:none">🎮</div>
          <div class="stream-body">
            <div class="stream-name">${esc(s.user_name)}</div>
            <div class="stream-title">${esc(s.title || '—')}</div>
            <div class="stream-viewers"><span class="live-dot"></span>${viewers} Zuschauer</div>
            <button class="btn btn-sm stream-select-btn">+ Pool starten</button>
          </div>
        </div>`;
    }).join('');
  }

  function selectStream(login, name) {
    showCreateModal(login, name);
  }

  /* ─── Load pools ─────────────────────────────────────────────────────────── */
  async function loadPools() {
    try {
      const data = await apiFetch('/api/pools');
      pools = data.pools || [];
      renderPools();
    } catch (e) {
      document.getElementById('poolGrid').innerHTML =
        `<div style="grid-column:1/-1" class="empty"><div class="empty-icon">⚠️</div><p>${e.message}</p></div>`;
    }
  }

  function renderPools() {
    const grid = document.getElementById('poolGrid');
    const badge = document.getElementById('poolCountBadge');
    const open = pools.filter(p => p.status === 'open');
    badge.textContent = open.length;
    badge.style.display = open.length ? 'inline' : 'none';

    if (!pools.length) {
      grid.innerHTML = `<div style="grid-column:1/-1" class="empty">
        <div class="empty-icon">💰</div>
        <p>Noch keine Pools. Erstelle den ersten!</p>
      </div>`;
      return;
    }

    grid.innerHTML = pools.map(p => {
      const pct = Math.min(100, Math.round((p.ist_betrag / p.ziel_betrag) * 100));
      const done = p.ist_betrag >= p.ziel_betrag;
      const isOpen = p.status === 'open';
      const statusLabel = { open: 'Offen', triggered: 'Ausgelöst!', closed: 'Geschlossen', captcha_required: '⚠ Manuelle Zahlung' }[p.status] || p.status;
      const statusCls   = { open: '', triggered: 'triggered', captcha_required: 'captcha' }[p.status] || 'triggered';
      const captchaInfo = p.status === 'captcha_required'
        ? `<div class="captcha-admin-info">🔒 CAPTCHA blockiert Bot — manuelle Zahlung nötig<br>Pool-ID: <code>${esc(p.id)}</code> · Betrag: <strong>${p.ist_betrag.toFixed(2)} €</strong></div>`
        : '';
      return `
        <div class="pool-card">
          <div class="pool-card-head">
            <div>
              <div class="pool-streamer">@${esc(p.streamer)}</div>
              <div class="pool-gruppe">${esc(p.gruppe_name)}</div>
            </div>
            <span class="pool-status ${statusCls}">${statusLabel}</span>
          </div>
          <div class="pool-msg">"${esc(p.message)}"</div>
          <div class="progress-wrap">
            <div class="progress-label">
              <span><strong>${p.ist_betrag.toFixed(2)} €</strong> gesammelt</span>
              <span>Ziel: <strong>${p.ziel_betrag.toFixed(2)} €</strong></span>
            </div>
            <div class="progress-bar">
              <div class="progress-fill ${done ? 'done' : ''}" style="width:${pct}%"></div>
            </div>
          </div>
          <div class="pool-meta">
            <span>👥 ${p.contributor_count || 0} Teilnehmer</span>
            <span>📊 ${pct}%</span>
          </div>
          ${captchaInfo}
          <div class="pool-actions">
            ${isOpen
              ? `<button class="btn btn-sm btn-green" onclick="showJoinModal('${p.id}')">💸 Mitmachen</button>`
              : `<button class="btn btn-sm btn-outline" disabled>Beendet</button>`}
            <button class="btn btn-sm btn-outline" onclick="showDetails('${p.id}')">Details</button>
          </div>
        </div>`;
    }).join('');
  }

  /* ─── Create pool ────────────────────────────────────────────────────────── */
  function showCreateModal(login = '', name = '') {
    document.getElementById('c-streamer').value = login || name;
    document.getElementById('c-gruppe').value   = '';
    document.getElementById('c-message').value  = '';
    document.getElementById('c-ziel').value     = '';
    document.getElementById('createSubmitBtn').disabled = false;
    openModal('createModal');
  }

  async function submitCreate() {
    const streamer    = document.getElementById('c-streamer').value.trim();
    const gruppe_name = document.getElementById('c-gruppe').value.trim();
    const message     = document.getElementById('c-message').value.trim();
    const ziel_betrag = parseFloat(document.getElementById('c-ziel').value);

    if (!streamer || !gruppe_name || !message || !ziel_betrag || ziel_betrag <= 0) {
      toast('Bitte alle Felder ausfüllen.', 'error'); return;
    }

    const btn = document.getElementById('createSubmitBtn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>Erstelle…';

    try {
      await apiFetch('/pool/create', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ streamer, gruppe_name, message, ziel_betrag }),
      });
      closeModal('createModal');
      toast('✅ Pool erstellt!', 'success');
      await loadPools();
      switchTabByName('pools');
    } catch (e) {
      toast('❌ ' + e.message, 'error');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Pool erstellen';
    }
  }

  /* ─── Join pool ──────────────────────────────────────────────────────────── */
  async function showJoinModal(poolId) {
    activeJoinPoolId = poolId;
    const pool = pools.find(p => p.id === poolId);
    if (!pool) return;

    document.getElementById('joinPoolInfo').innerHTML = `
      <strong>${esc(pool.gruppe_name)}</strong> → <span style="color:var(--purple)">@${esc(pool.streamer)}</span><br>
      <span style="color:var(--muted);font-size:12px;">${esc(pool.message)}</span><br>
      <span style="font-size:12px;margin-top:6px;display:inline-block;">
        💰 ${pool.ist_betrag.toFixed(2)} € / ${pool.ziel_betrag.toFixed(2)} € gesammelt
      </span>`;

    document.getElementById('j-name').value   = '';
    document.getElementById('j-betrag').value = '';
    document.getElementById('joinSubmitBtn').disabled = false;

    // load contributions
    try {
      const data = await apiFetch(`/pool/${poolId}`);
      const paid = (data.contributions || []).filter(c => c.status === 'paid');
      const div  = document.getElementById('joinContribs');
      if (paid.length) {
        div.innerHTML = `<ul class="contrib-list">${paid.map(c =>
          `<li><span>${esc(c.teilnehmer_name)}</span><strong>+${c.betrag.toFixed(2)} €</strong></li>`
        ).join('')}</ul>`;
      } else {
        div.innerHTML = '<p style="font-size:12px;color:var(--muted)">Noch keine Teilnehmer.</p>';
      }
    } catch (_) {}

    openModal('joinModal');
  }

  async function submitJoin() {
    const teilnehmer_name = document.getElementById('j-name').value.trim();
    const betrag          = parseFloat(document.getElementById('j-betrag').value);

    if (!teilnehmer_name || !betrag || betrag <= 0) {
      toast('Bitte Name und Betrag eingeben.', 'error'); return;
    }

    const btn = document.getElementById('joinSubmitBtn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>Sende…';

    try {
      const data = await apiFetch(`/pool/${activeJoinPoolId}/join`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ teilnehmer_name, betrag }),
      });
      closeModal('joinModal');
      toast('✅ ' + (data.msg || 'Erfolgreich beigetreten!'), 'success');
      await loadPools();
    } catch (e) {
      toast('❌ ' + e.message, 'error');
    } finally {
      btn.disabled = false;
      btn.innerHTML = '✅ Mitmachen (simuliert)';
    }
  }

  /* ─── Details ────────────────────────────────────────────────────────────── */
  async function showDetails(poolId) {
    try {
      const data = await apiFetch(`/pool/${poolId}`);
      const p    = data.pool;
      const paid = (data.contributions || []).filter(c => c.status === 'paid');
      const total = paid.reduce((s, c) => s + c.betrag, 0);
      alert(
        `Pool: ${p.gruppe_name}\nStreamer: @${p.streamer}\nNachricht: ${p.message}\n` +
        `Gesammelt: ${p.ist_betrag.toFixed(2)} € / ${p.ziel_betrag.toFixed(2)} €\n` +
        `Status: ${p.status}\n\nTeilnehmer:\n` +
        (paid.length ? paid.map(c => `• ${c.teilnehmer_name}: ${c.betrag.toFixed(2)} €`).join('\n') : '(keine)')
      );
    } catch (e) { toast('❌ ' + e.message, 'error'); }
  }

  /* ─── Modal helpers ──────────────────────────────────────────────────────── */
  function openModal(id)  { document.getElementById(id).classList.add('open'); }
  function closeModal(id) { document.getElementById(id).classList.remove('open'); }
  function closeOnBackdrop(e, id) { if (e.target === e.currentTarget) closeModal(id); }

  /* ─── Tab by name (no event) ─────────────────────────────────────────────── */
  function switchTabByName(name) {
    const tabs = document.querySelectorAll('.tab');
    const idx  = name === 'streams' ? 0 : 1;
    tabs.forEach((t, i) => t.classList.toggle('active', i === idx));
    document.querySelectorAll('.section').forEach((s, i) => s.classList.toggle('active', i === idx));
  }

  /* ─── Toast ──────────────────────────────────────────────────────────────── */
  let toastTimer;
  function toast(msg, type = '') {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = 'show ' + type;
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => { el.className = ''; }, 3000);
  }

  /* ─── Escape helper ──────────────────────────────────────────────────────── */
  function esc(str) {
    return String(str ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  /* ─── Reload + countdown ─────────────────────────────────────────────────── */
  function reload() {
    loadStreams();
    loadPools();
    resetCountdown();
  }

  function resetCountdown() {
    countdown = 30;
    clearInterval(countdownInterval);
    countdownInterval = setInterval(() => {
      countdown--;
      document.getElementById('refreshTimer').textContent = `Auto-Refresh in ${countdown}s`;
      if (countdown <= 0) { reload(); }
    }, 1000);
  }

  /* ─── Init ───────────────────────────────────────────────────────────────── */
  loadStreams();
  loadPools();
  resetCountdown();
</script>
</body>
</html>
